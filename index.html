<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณสเตตัสและวัตถุดิบ (RPG Calculator)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .calculator-card {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #4caf50;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .flex-group {
            display: flex;
            gap: 15px;
        }
        .flex-group .form-group {
            flex: 1;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #cdcdcd;
            font-size: 14px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #1e1e24;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #4caf50;
        }
        .result-container {
            background-color: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 5px solid #4caf50;
            max-height: 450px;
            overflow-y: auto;
        }
        .result-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 15px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* สไตล์สำหรับตาราง */
        .stat-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .stat-table th {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
            text-align: right;
        }
        .stat-table th:first-child { text-align: center; }
        
        .stat-table td {
            padding: 12px 5px;
            text-align: right;
            border-bottom: 1px solid #333;
            font-size: 15px;
            font-weight: bold;
        }
        .stat-table td:first-child { text-align: center; }
        .stat-table tr:last-child td { border-bottom: none; }
        
        .stat-atk { color: #ff5252; }
        .stat-hp { color: #448aff; }
        .stat-mat { color: #ffeb3b; font-size: 14px !important; }
        .star-icon { color: #ffca28; font-size: 13px;}
        
        /* สีกำกับตามระดับความหายาก */
        .tier-Common { color: #b0bec5; font-weight: bold;}
        .tier-Uncommon { color: #4caf50; font-weight: bold;}
        .tier-Rare { color: #2196f3; font-weight: bold;}
        .tier-Epic { color: #9c27b0; font-weight: bold;}
        .tier-Legendary { color: #ff9800; font-weight: bold;}
        
        .drop-rate-badge {
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 10px;
            color: #e0e0e0;
        }

        /* ปรับแต่ง Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e24; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>📊 คำนวณสเตตัสและวัตถุดิบ</h2>
    
    <div class="flex-group">
        <div class="form-group">
            <label for="baseAtk">⚔️ Base ATK เริ่มต้น</label>
            <input type="number" id="baseAtk" value="10" min="1" oninput="calculateStats()">
        </div>
        <div class="form-group">
            <label for="baseHp">❤️ Base HP เริ่มต้น</label>
            <input type="number" id="baseHp" value="100" min="1" oninput="calculateStats()">
        </div>
    </div>
    
    <hr style="border: 0; border-top: 1px solid #333; margin-bottom: 20px;">

    <div class="form-group">
        <label for="rarity">ระดับของการ์ด (Rarity)</label>
        <select id="rarity" onchange="calculateStats()">
            <option value="Common" selected>Common</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Epic">Epic</option>
            <option value="Legendary">Legendary</option>
        </select>
    </div>

    <div class="form-group">
        <label for="focus">รูปแบบสเตตัส (Focus)</label>
        <select id="focus" onchange="calculateStats()">
            <option value="balanced" selected>สมดุล (Balanced)</option>
            <option value="atk">เน้นพลังโจมตี (Focus ATK)</option>
            <option value="hp">เน้นพลังชีวิต (Focus HP)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="stars">จำนวนดาวที่ต้องการ (1 - 15 ดาว)</label>
        <select id="stars" onchange="calculateStats()">
            <script>
                for(let i=1; i<=15; i++) {
                    document.write(`<option value="${i}">${i} ดาว</option>`);
                }
            </script>
        </select>
    </div>

    <div class="result-container">
        <div class="result-title">
            <span>ตารางการเติบโต</span>
            <div>
                <span id="display-droprate" class="drop-rate-badge">Drop Rate: 50%</span>
                <span id="display-tier" class="tier-Common">Common</span>
            </div>
        </div>
        <div id="result-list">
            <!-- ตารางผลลัพธ์ -->
        </div>
    </div>
</div>

<script>
    function calculateStats() {
        const baseAtk = parseFloat(document.getElementById('baseAtk').value) || 0;
        const baseHp = parseFloat(document.getElementById('baseHp').value) || 0;

        const rarity = document.getElementById('rarity').value;
        const focus = document.getElementById('focus').value;
        const maxStars = parseInt(document.getElementById('stars').value);

        // 1. ตั้งค่าตัวคูณสเตตัส อัตราดรอป และ วัตถุดิบ
        let rarityMultiplier = 1.0;
        let baseMat = 1;  
        let stepMat = 1;  
        let dropRate = "50%";

        switch(rarity) {
            case 'Common': 
                rarityMultiplier = 1.0; baseMat = 10; stepMat = 5; dropRate = "50%"; break;
            case 'Uncommon': 
                rarityMultiplier = 1.4; baseMat = 8; stepMat = 4; dropRate = "30%"; break;
            case 'Rare': 
                rarityMultiplier = 2.0; baseMat = 5; stepMat = 3; dropRate = "15%"; break;
            case 'Epic': 
                rarityMultiplier = 3.0; baseMat = 3; stepMat = 2; dropRate = "4.5%"; break;
            case 'Legendary': 
                rarityMultiplier = 4.5; baseMat = 1; stepMat = 1; dropRate = "0.5%"; break; 
        }

        let atkFocusMod = 1.0;
        let hpFocusMod = 1.0;

        if (focus === 'atk') {
            atkFocusMod = 1.5;  
            hpFocusMod = 0.7;   
        } else if (focus === 'hp') {
            atkFocusMod = 0.7;  
            hpFocusMod = 1.5;   
        }

        let tierBaseAtk = baseAtk * rarityMultiplier * atkFocusMod;
        let tierBaseHp = baseHp * rarityMultiplier * hpFocusMod;
        const growthPerStar = 0.20; 

        let htmlContent = '<table class="stat-table">';
        htmlContent += '<tr><th>ดาว</th><th>⚔️ ATK</th><th>❤️ HP</th><th>📦 วัตถุดิบ</th></tr>';

        for (let star = 1; star <= maxStars; star++) {
            
            let currentAtk = Math.round(tierBaseAtk * (1 + (star - 1) * growthPerStar));
            let currentHp = Math.round(tierBaseHp * (1 + (star - 1) * growthPerStar));
            
            // คำนวณแบบเชิงเส้น โดยให้ดาวที่ 1 เสียวัตถุดิบในการปลดล็อค/อัปเกรดด้วย
            let actualCost = baseMat + (stepMat * (star - 1));
            let materialCostDisplay = actualCost.toLocaleString();

            htmlContent += `
                <tr>
                    <td style="color: #cdcdcd;">${star} <span class="star-icon">★</span></td>
                    <td class="stat-atk">${currentAtk.toLocaleString()}</td>
                    <td class="stat-hp">${currentHp.toLocaleString()}</td>
                    <td class="stat-mat">${materialCostDisplay}</td>
                </tr>
            `;
        }
        
        htmlContent += '</table>';

        document.getElementById('result-list').innerHTML = htmlContent;
        
        // อัปเดต Drop Rate
        document.getElementById('display-droprate').innerText = `Drop Rate: ${dropRate}`;

        // อัปเดต Rarity 
        const tierDisplay = document.getElementById('display-tier');
        tierDisplay.innerText = rarity;
        tierDisplay.className = ''; 
        tierDisplay.classList.add('tier-' + rarity);
    }

    window.onload = function() {
        document.getElementById('stars').value = "5";
        calculateStats();
    };
</script>

</body>
</html>
